<section class="py-20 bg-gray-50 dark:bg-gray-950 px-6 transition-colors duration-500">
  <div class="max-w-7xl mx-auto">
    
    <div class="text-center mb-16" appScrollReveal>
      <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Mis Habilidades</h2>
      <div class="h-1 w-20 bg-blue-600 mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <div *ngFor="let category of skillCategories; let i = index" 
           appScrollReveal 
           [style.transition-delay]="i * 200 + 'ms'"
           class="bg-white dark:bg-gray-900 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
        
        <div class="flex items-center mb-8">
          <span class="text-3xl mr-4">{{ category.icon }}</span>
          <h3 class="text-xl font-bold dark:text-white">{{ category.category }}</h3>
        </div>

        <div class="space-y-6">
          <div *ngFor="let skill of category.skills">
            <div class="flex justify-between mb-2">
              <span class="text-sm font-semibold dark:text-gray-300">{{ skill.name }}</span>
              <span class="text-sm text-blue-600 font-bold">{{ skill.level }}%</span>
            </div>
            
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5 overflow-hidden">
              <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-1000 ease-out"
                   [style.width.%]="skill.level">
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
