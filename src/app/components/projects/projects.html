<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" appScrollReveal>
  <div *ngFor="let project of projects; let i = index" 
  [style.transition-delay]="i * 100 + 'ms'"
  class="group bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition">
    <img [src]="project.img" [alt]="project.title" class="w-full h-56 object-cover group-hover:scale-105 transition duration-500">
    
    <div class="p-6">
      <div class="flex gap-2 mb-3">
        <span *ngFor="let tag of project.tags" class="text-[10px] uppercase tracking-widest font-bold bg-blue-50 dark:bg-blue-900 text-blue-600 dark:text-blue-300 px-2 py-1 rounded">
          {{ tag }}
        </span>
      </div>
      
      <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">{{ project.title }}</h3>      
      <a *ngIf="project.link" [href]="project.link" target="_blank" class="text-blue-600 dark:text-blue-400 font-semibold text-sm hover:underline inline-flex items-center">
        Ver detalles 
        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
      </a>
    </div>
  </div>
</div>
